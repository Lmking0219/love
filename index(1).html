<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>有句话想对你说</title><style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei";display:flex;justify-content:center;align-items:center;height:100vh;background:linear-gradient(-45deg,#ff9a9e,#fad0c4,#ffd1dc);background-size:400% 400%;animation:bg 10s infinite;overflow:hidden}
@keyframes bg{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}
.card{background:rgba(255,255,255,.92);padding:40px;border-radius:20px;max-width:560px;width:90%;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.15)}
#typing{font-size:24px;line-height:1.8;min-height:150px;white-space:pre-wrap}
button{padding:14px 30px;border:none;border-radius:999px;font-size:18px;cursor:pointer;margin:10px}
#yes{background:#ff4d6d;color:#fff}#no{background:#eee}.heart{position:fixed;bottom:-20px;animation:f 5s linear forwards}
@keyframes f{to{transform:translateY(-110vh) rotate(360deg);opacity:0}}
#result{margin-top:20px;color:#ff4d6d;font-size:26px;font-weight:bold}
</style></head><body><div class='card'><h1>🐶</h1><div id='typing'></div><button id='yes'>愿意 🩷</button><button id='no'>不要</button><div id='result'></div></div>
<script>
const t="认真问你一个问题。\n\n以后……\n\n可以当我的小狗吗？🐶";
let i=0;(function w(){if(i<t.length){typing.innerHTML+=(t[i]=="\n"?"<br>":t[i]);i++;setTimeout(w,55)}})();
yes.onclick=()=>{result.innerHTML="🥹 汪！以后就请多多关照啦 ❤️";setInterval(()=>{let h=document.createElement('div');h.className='heart';h.innerHTML=['🐶','🩷','❤️'][Math.floor(Math.random()*3)];h.style.left=Math.random()*100+'vw';h.style.fontSize=(20+Math.random()*20)+'px';document.body.appendChild(h);setTimeout(()=>h.remove(),5000)},180)}
no.onmouseover=function(){this.style.position='fixed';this.style.left=Math.random()*80+'vw';this.style.top=Math.random()*80+'vh';}
</script></body></html>
